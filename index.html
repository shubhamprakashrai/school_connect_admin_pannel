<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="School Connect" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>School Connect — All-in-One School Management System</title>
    <meta name="description" content="School Connect is the all-in-one school OS for admins, teachers and parents — students, attendance, exams, calendar, fees, and reports." />
    <meta name="keywords" content="school management, school OS, student attendance, parent portal, school SaaS, education software" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://schoolconnect.example.com/" />
    <meta property="og:title" content="School Connect — All-in-One School Management System" />
    <meta property="og:description" content="One platform for admins, teachers and parents — students, attendance, exams, calendar, fees, and reports." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="School Connect" />
    <meta name="twitter:description" content="The school OS your team will love." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Avoid FOUC for dark mode by applying the class before React mounts -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('sc_theme');
          var dark = stored === 'dark' ||
            ((!stored || stored === 'system') &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
